<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mostrar Imagem</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      font-family: Arial, sans-serif;
    }

    .imagem {
      width: 700px;
      max-width: 90%;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <img src="imagem.jpg" alt="Imagem" class="imagem">

</body>
</html>
